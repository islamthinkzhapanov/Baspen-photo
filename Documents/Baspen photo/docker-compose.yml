services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: baspen
      POSTGRES_USER: baspen
      POSTGRES_PASSWORD: baspen_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  compreface:
    image: exadel/compreface:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - compreface-postgres

  compreface-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: frs
      POSTGRES_USER: frs
      POSTGRES_PASSWORD: frs_dev
    volumes:
      - compreface_pgdata:/var/lib/postgresql/data

  bib-detector:
    build: ./bib-detector
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  pgdata:
  miniodata:
  compreface_pgdata:
